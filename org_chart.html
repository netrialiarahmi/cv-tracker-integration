<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization Structure — KG MEDIA (April 2026)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f0f2f5;
  color: #333;
  min-height: 100vh;
}
 
/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.header h1 {
  font-size: 15px; font-weight: 700; color: #1a237e;
  white-space: nowrap;
}
.search-box {
  position: relative; flex: 0 1 300px;
}
.search-box input {
  width: 100%; padding: 6px 12px 6px 32px;
  border: 1px solid #ccc; border-radius: 20px;
  font-size: 13px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-box input:focus {
  border-color: #5c6bc0;
  box-shadow: 0 0 0 3px rgba(92,107,192,.15);
}
.search-box::before {
  content: '\1F50D'; position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); font-size: 13px; opacity: .4;
}
.header-actions {
  margin-left: auto; display: flex; gap: 6px;
}
.header-actions button {
  padding: 5px 12px; border: 1px solid #ccc; border-radius: 6px;
  background: #fff; font-size: 12px; cursor: pointer;
  color: #555; transition: all .15s;
}
.header-actions button:hover { background: #f5f5f5; border-color: #999; }
.badge {
  font-size: 11px; color: #888; white-space: nowrap;
}

/* ── Org Tree ── */
.org-tree {
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px 80px;
  min-width: min-content;
  overflow-x: auto;
}

/* ── Card ── */
.card {
  position: relative;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 12px 16px;
  min-width: 180px;
  max-width: 260px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  user-select: none;
}
.card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
  transform: translateY(-2px);
}
.card--expanded {
  border-color: #5c6bc0;
}

/* Avatar */
.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 6px;
  font-weight: 700; font-size: 15px;
  color: #fff;
}

.card-name {
  font-weight: 600; font-size: 13px; color: #222;
  line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-sub {
  font-size: 11px; color: #888;
  margin-top: 2px;
  line-height: 1.2;
  display: -webkit-box; -webkit-line-clamp: 1;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* Expand badge */
.expand-badge {
  position: absolute;
  bottom: -12px; left: 50%;
  transform: translateX(-50%);
  background: #fff; border: 1px solid #ddd;
  border-radius: 10px; padding: 1px 8px;
  font-size: 10px; color: #666;
  white-space: nowrap;
  transition: all .15s;
  z-index: 2;
}
.card:hover .expand-badge {
  background: #5c6bc0; color: #fff; border-color: #5c6bc0;
}

/* ── Children container ── */
.children-wrap {
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
.children-row {
  display: flex;
  gap: 0;
  justify-content: center;
  position: relative;
  padding-top: 24px;
}
.child-branch {
  display: flex; flex-direction: column; align-items: center;
  padding: 0 8px;
  position: relative;
}

/* ── Connector lines ── */
.children-row::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 24px;
}

/* Vertical line from parent down */
.children-wrap > .vline {
  width: 1px; height: 24px;
  background: #ccc;
}

/* Horizontal line across children */
.children-row > .hline {
  position: absolute;
  top: 0;
  height: 1px;
  background: #ccc;
}

/* Vertical line from hline down to each child */
.child-branch::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  width: 1px; height: 24px;
  background: #ccc;
}

/* ── Level colors ── */
.level-0 .avatar { background: #42a5f5; }
.level-1 .avatar { background: #5c6bc0; }
.level-2 .avatar { background: #26a69a; }
.level-3 .avatar { background: #66bb6a; }
.level-4 .avatar { background: #ffa726; }
.level-5 .avatar { background: #ef5350; }

.level-0 { border-left: 3px solid #42a5f5; }
.level-1 { border-left: 3px solid #5c6bc0; }
.level-2 { border-left: 3px solid #26a69a; }
.level-3 { border-left: 3px solid #66bb6a; }
.level-4 { border-left: 3px solid #ffa726; }
.level-5 { border-left: 3px solid #ef5350; }

/* Employee leaf card */
.card--leaf {
  background: #fafbff;
  border-style: dashed;
  min-width: 150px;
}
.card--leaf .card-name { font-size: 12px; }
.card--leaf .card-sub { color: #ef5350; font-weight: 500; }

/* ── Search highlight ── */
.card--match {
  border-color: #ffd54f !important;
  box-shadow: 0 0 0 3px rgba(255,213,79,.4), 0 4px 12px rgba(0,0,0,.1) !important;
  z-index: 10;
}
.card--dimmed {
  opacity: .2;
}

/* ── Scroll container ── */
.scroll-wrap {
  width: 100%;
  overflow: auto;
  padding-top: 56px;
}

/* ── Animation ── */
.children-row { animation: fadeSlide .3s ease; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

</div>

<div class="scroll-wrap">

</div>

  const LEVEL_NAMES = ['Company','Directorate','Division','Department','Section','Position'];

  // Track expanded state by path
  const expanded = new Set();
  let matchSet = new Set();

  // ── Render a single node ──
  function renderNode(node, path) {
    const el = document.createElement('div');
    el.className = 'children-wrap';

    const card = document.createElement('div');
    card.className = `card level-${node.level}`;
    card.dataset.path = path;

    if (expanded.has(path)) card.classList.add('card--expanded');

    const isLeaf = !node.children || node.children.length === 0;
    if (isLeaf) card.classList.add('card--leaf');

    // Avatar
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = getInitials(node.name);
    card.appendChild(avatar);

    // Name
    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = node.name;
    card.appendChild(nameEl);

    // Subtitle
    const subEl = document.createElement('div');
    subEl.className = 'card-sub';
    if (isLeaf) {
      subEl.textContent = `Position · ${node.size} ${node.size > 1 ? 'people' : 'person'}`;
    } else {
      subEl.textContent = LEVEL_NAMES[node.level] || '';
      if (node.size) subEl.textContent += ` · ${node.size} people`;
    }
    card.appendChild(subEl);

    // Expand badge
    if (node.children && node.children.length > 0) {
      const badge = document.createElement('div');
      badge.className = 'expand-badge';
      const isExp = expanded.has(path);
      badge.textContent = isExp ? `▲ ${node.children.length}` : `▼ ${node.children.length}`;
      card.appendChild(badge);

      card.addEventListener('click', (e) => {
        e.stopPropagation();
        if (expanded.has(path)) {
          // Collapse this + all children
          for (const p of [...expanded]) {
            if (p === path || p.startsWith(path + '/')) expanded.delete(p);
          }
        } else {
          expanded.add(path);
        }
        renderTree();
      });
    }

    // Search highlight
    if (matchSet.size > 0) {
      if (matchSet.has(path)) {
        card.classList.add('card--match');
      } else {
        card.classList.add('card--dimmed');
      }
    }

    el.appendChild(card);

    // Render children if expanded (LAZY — only renders when expanded)
    if (expanded.has(path) && node.children && node.children.length > 0) {
      // Vertical connector
      const vline = document.createElement('div');
      vline.className = 'vline';
      el.appendChild(vline);

      const row = document.createElement('div');
      row.className = 'children-row';

      // Horizontal connector
      if (node.children.length > 1) {
        const hline = document.createElement('div');
        hline.className = 'hline';
        row.appendChild(hline);
        // Position hline after render
        requestAnimationFrame(() => {
          const branches = row.querySelectorAll(':scope > .child-branch');
          if (branches.length >= 2) {
            const first = branches[0];
            const last = branches[branches.length - 1];
            const rowRect = row.getBoundingClientRect();
            const fl = first.getBoundingClientRect().left + first.getBoundingClientRect().width / 2 - rowRect.left;
            const ll = last.getBoundingClientRect().left + last.getBoundingClientRect().width / 2 - rowRect.left;
            hline.style.left = fl + 'px';
            hline.style.width = (ll - fl) + 'px';
          }
        });
      }

      node.children.forEach((child, ci) => {
        const branch = document.createElement('div');
        branch.className = 'child-branch';
        const childPath = path + '/' + ci;
        const childNode = renderNode(child, childPath);
        branch.appendChild(childNode);
        row.appendChild(branch);
      });

      el.appendChild(row);
    }

    return el;
  }

  function getInitials(name) {
    // Remove parenthetical counts like "(123)"
    const clean = name.replace(/\s*\(\d+\)\s*$/, '').trim();
    const words = clean.split(/[\s\-]+/).filter(w => w.length > 0);
    if (words.length === 0) return '?';
    if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
    return (words[0][0] + words[words.length - 1][0]).toUpperCase();
  }

  // ── Full render ──
  function renderTree() {
    const container = document.getElementById('orgTree');
    container.innerHTML = '';
    const tree = renderNode(DATA, 'root');
    container.appendChild(tree);
    updateInfo();
  }

  function updateInfo() {
    const cards = document.querySelectorAll('.card');
    document.getElementById('infoBadge').textContent =
      `Showing ${cards.length} nodes · Total ${DATA.size} employees · April 2026`;
  }

  // ── Expand / Collapse controls ──
  window.collapseAll = function() {
    expanded.clear();
    renderTree();
  };

  window.expandLevel = function(maxLevel) {
    expanded.clear();
    function walk(node, path) {
      if (node.level < maxLevel && node.children) {
        expanded.add(path);
        node.children.forEach((c, i) => walk(c, path + '/' + i));
      }
    }
    walk(DATA, 'root');
    renderTree();
  };

  // ── Search ──
  const searchInput = document.getElementById('searchInput');
  let searchTimeout;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(doSearch, 300);
  });

  function doSearch() {
    const query = searchInput.value.trim().toLowerCase();
    matchSet = new Set();

    if (!query) {
      renderTree();
      return;
    }

    // Find all matching paths and expand ancestors
    function walk(node, path) {
      let found = false;
      if (node.name.toLowerCase().includes(query)) {
        found = true;
        matchSet.add(path);
      }
      if (node.children) {
        node.children.forEach((c, i) => {
          const cp = path + '/' + i;
          if (walk(c, cp)) {
            found = true;
            matchSet.add(path);  // ancestor matches too
          }
        });
      }
      if (found) {
        expanded.add(path);  // auto-expand path to match
      }
      return found;
    }
    walk(DATA, 'root');
    renderTree();

    // Scroll to first match
    requestAnimationFrame(() => {
      const match = document.querySelector('.card--match:not(.card--dimmed)');
      if (match) match.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
    }
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchInput.blur();
      matchSet = new Set();
      renderTree();
    }
  });

  // Initial render — show root + directorates
  expanded.add('root');
  renderTree();
})();
</script>
</body>
</html>
